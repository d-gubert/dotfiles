# LG 34" UltraWide -- 2560x1080, 798mm x 334mm
#
# EDID_ID is bytes 8-11 of the EDID: manufacturer id 1e6d (LG Electronics)
# followed by product code f159. Read it off any connected monitor with:
#   xrandr --query --verbose | grep -A2 '^\s*EDID'
EDID_ID="1e6df159"

NAME="LG UltraWide"

# The external panel: primary. POSITION is the top-left corner, <X>x<Y>.
MODE="2560x1080"
RATE="60.00"
POSITION="0x0"

# The laptop panel. Coordinates are applied exactly as written;
# for reference, this one sits below the external, horizontally centred.
LAPTOP_MODE="1920x1080"
LAPTOP_RATE="144.00"
LAPTOP_POSITION="320x1080"

# FONT_SIZE covers the window titles and is the default for both bars.
# The bars can differ per screen: this panel is ~81 DPI against the laptop's
# ~142, so the laptop bar needs a larger point size to read the same.
# Drop either BAR_*_SIZE line to have that bar follow FONT_SIZE.
FONT_FAMILY="DejaVu Sans Mono"
FONT_SIZE="8"
BAR_FONT_SIZE="8"
LAPTOP_BAR_FONT_SIZE="9"
