set-option -ga terminal-overrides "alacritty:Tc" # the name before :Tc  should be the value of $TERM outside of tmux
set-option -ga terminal-overrides ",*256col*:Tc" # the name before :Tc  should be the value of $TERM outside of tmux
set-option -a terminal-features "alacritty:RGB"  # the name before :RGB should be the value of $TERM outside of tmux
set-option -sg escape-time 10 # Neovim suggestion

# Start windows and panes at 1, not 0 - 0 is harder to hit
set -g base-index 1
set -g pane-base-index 1
set -g automatic-rename off
set-option -g renumber-windows on
set-window-option -g pane-base-index 1

# This prevents tmux from starting login shells
set -g default-command $SHELL

setw -g mouse on
setw -g mode-keys vi

set -g status-position "bottom"
set -g status-left ""
set -g status-right ""

set -g pane-border-status "top"

# HOOKS ==========================================
set-hook -g session-created "rename-window 'Tab #1'"
set-hook -g after-new-window "rename-window 'Tab ###{window_index}'"
# =================================================

# ROOT BINDS ======================================
bind-key -n M-j   select-pane -L
bind-key -n M-k   select-pane -D
bind-key -n M-l   select-pane -U
bind-key -n M-';' select-pane -R

bind-key -n M-1   select-window -t 1
bind-key -n M-2   select-window -t 2
bind-key -n M-3   select-window -t 3
bind-key -n M-4   select-window -t 4
bind-key -n M-5   select-window -t 5

bind-key -n M-J   resize-pane -L 5
bind-key -n M-K   resize-pane -D 5
bind-key -n M-L   resize-pane -U 5
bind-key -n M-':' resize-pane -R 5

bind-key -n M-'/' command-prompt
bind-key -n M-c   copy-mode
bind-key -n M-n   split-window -h -c "#{pane_current_path}"
bind-key -n M-N   split-window -v -c "#{pane_current_path}"
bind-key -n M-w   new-window -c "#{pane_current_path}"

bind-key -n M-e {
	run-shell 'tmux capture-pane -pS - | cat - > "/tmp/.tmux.scrollback.dump"'
	send-keys '  $EDITOR /tmp/.tmux.scrollback.dump'
}
# =================================================

# PREFIX BINDS ====================================
unbind C-b
set -g prefix M-Space
bind M-Space send-prefix

bind j swap-pane -U \; switch-client -T prefix
bind k swap-pane -D \; switch-client -T prefix
bind u swap-window -t -1 \; switch-client -T prefix
bind i swap-window -t +1 \; switch-client -T prefix

bind v split-window -f -v
bind h split-window -f -h

bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind t command-prompt -I "New window" { new-window -c "#{pane_current_path}" -n "%%" }
bind r command-prompt -I "#W" { rename-window "%%" }

bind f resize-pane -Z
bind l refresh-client
bind q detach-client




bind w run-shell -E '
	cd "#{pane_current_path}"

	repo=$(gh repo view --json nameWithOwner -q ".nameWithOwner" 2>/dev/null)
	branch=$(git status --branch 2>/dev/null | head -1)
	branchNeedle="On branch "
	detachedNeedle="Head detached at "
	[ "${branch#$branchNeedle}" != "$branch" ] && parsedBranch=${branch#$branchNeedle} || parsedBranch=""
	[ "${branch#$detachedNeedle}" != "$branch" ] && parsedCommit=${branch#$detachedNeedle} || parsedCommit=""

	if [ -n "$repo" ]; then
		winname=$repo
	else
		winname=$(basename `pwd`)
	fi

	if [ -n "$parsedBranch" ]; then
		winname="$winname##$parsedBranch"
	fi

	if [ -n "$parsedCommit" ]; then
		winname="$winname##$parsedCommit"
	fi

	tmux rename-window "$winname"
'
# =================================================

# copy using wayland copy - I'll leave this here, I might use wayland in an unknown future ¯\_(ツ)_/¯
if-shell -b '[ "$XDG_SESSION_TYPE" = "wayland" ]' {
	set-option -s set-clipboard off
	bind P paste-buffer
	bind-key -T copy-mode-vi v send-keys -X begin-selection
	bind-key -T copy-mode-vi V send-keys -X rectangle-toggle
	unbind -T copy-mode-vi Enter
	bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
	bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'wl-copy'
	bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'
}

# THEME ===========================================
set -g @catppuccin_flavor "macchiato"

# Special characters:
#  U+E0B2 - printf '\xue0b2'
#  U+E0B0 - printf '\xue0b0'

## Window appearance in status line (different from left and right)
set -g @catppuccin_window_current_text " #{window_name}"
set -g @catppuccin_window_text " #{window_name}"
set -g @catppuccin_window_flags "icon"
### Zellij-like styling
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_right_separator "#[fg=#{@_ctp_status_bg},reverse]#[none]"
set -g @catppuccin_window_left_separator "#[fg=#{@_ctp_status_bg}]#[none]"
set -g @catppuccin_window_middle_separator "#[fg=#{@catppuccin_window_number_color},bg=#{@catppuccin_window_text_color}]"
set -g @catppuccin_window_current_middle_separator "#[fg=#{@catppuccin_window_current_number_color},bg=#{@catppuccin_window_current_text_color}]"

## Pane separation
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_border_status "yes"
set -g @catppuccin_pane_default_fill "number"
set -g @catppuccin_pane_default_text "##{pane_current_command}:##{pane_current_path}"

## Status line config
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "yes" # yes, no

run '~/.tmux/plugins/catppuccin/catppuccin.tmux'

set -g status-left-length 0

if-shell '[ -n "$SSH_CONNECTION" ]' {
	set -g status-left "#[fg=#{@thm_fg} bold]SSH "
} {
	set -g status-left "#[fg=#{@thm_fg} bold]TMUX "
}

set -ga status-left "#{?client_prefix,#[fg=#{@thm_red} bold]PREFIX ,#{?#{==:#{pane_mode},copy-mode},#[fg=#{@thm_yellow} bold]COPY ,#[fg=#{@thm_green} bold]ROOT }}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
# =================================================

# PLUGINS =========================================
# List of plugins
set -g @tpm_plugins '            \
	tmux-plugins/tpm             \
	tmux-plugins/tmux-sensible   \
	tmux-plugins/tmux-resurrect  \
	tmux-plugins/tmux-yank       \
'

run '~/.tmux/plugins/tpm/tpm'
